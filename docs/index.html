<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIGNAL — Suivi de prix MTG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-adapter-date-fns/3.0.0/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root{
    --ink:#0B0E17;
    --panel:#131826;
    --panel-alt:#171D2C;
    --line:#232B3D;
    --text:#EDEFF4;
    --muted:#8891A5;
    --foil:#C9A227;
    --rise:#46C08D;
    --fall:#E2585A;
    --arb:#3FB6C9;
  }
  *{box-sizing:border-box;}
  html{-webkit-font-smoothing:antialiased;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  .display{font-family:'Space Grotesk',sans-serif;}

  @media (prefers-reduced-motion: reduce){
    * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
  }

  /* --- Ticker --- */
  .ticker-wrap{
    background:var(--panel-alt);
    border-bottom:1px solid var(--line);
    overflow:hidden;
    white-space:nowrap;
    padding:9px 0;
  }
  .ticker-track{
    display:inline-block;
    padding-left:100%;
    animation:scroll-left 40s linear infinite;
  }
  .ticker-wrap:hover .ticker-track{ animation-play-state:paused; }
  @keyframes scroll-left{
    0%{ transform:translateX(0); }
    100%{ transform:translateX(-100%); }
  }
  .ticker-item{
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-right:36px;
    font-size:13px;
  }
  .ticker-item .name{ color:var(--text); font-weight:500; }
  .ticker-item .pct{ font-family:'JetBrains Mono',monospace; }
  .up{ color:var(--rise); }
  .down{ color:var(--fall); }
  .arb-tag{ color:var(--arb); }

  /* --- Header --- */
  header{
    max-width:1800px;
    margin:0 auto;
    padding:36px 24px 20px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:12px;
    border-bottom:1px solid var(--line);
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:26px;
    font-weight:700;
    letter-spacing:-0.01em;
    margin:0 0 4px;
  }
  h1 span{ color:var(--foil); }
  header p{
    margin:0;
    color:var(--muted);
    font-size:13.5px;
  }
  .updated{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--muted);
    text-align:right;
  }
  .updated b{ color:var(--text); font-weight:500; }

  main{
    max-width:1800px;
    margin:0 auto;
    padding:28px 24px 80px;
  }
  .layout{
    display:flex;
    flex-direction:column;
    gap:28px;
  }

  .section-title{
    font-family:'Space Grotesk',sans-serif;
    font-size:13px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    margin:0 0 14px;
  }

  /* --- Watchlist controls --- */
  .controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    margin-bottom:14px;
  }
  .controls input[type="text"], .controls select{
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:7px;
    padding:7px 10px;
    font-size:12.5px;
    font-family:'Inter',sans-serif;
  }
  .controls input[type="text"]{ min-width:180px; }
  .controls input[type="text"]:focus, .controls select:focus{ outline:1px solid var(--arb); }
  .controls label{
    display:flex;
    align-items:center;
    gap:5px;
    font-size:12px;
    color:var(--muted);
  }
  .row-count{
    margin-left:auto;
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    color:var(--muted);
  }

  /* --- Watchlist table --- */
  .table-wrap{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:auto;
    max-height:720px;
  }
  table{
    width:100%;
    border-collapse:collapse;
    font-size:12.5px;
  }
  thead th{
    position:sticky;
    top:0;
    background:var(--panel-alt);
    text-align:left;
    padding:9px 10px;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--muted);
    cursor:pointer;
    white-space:nowrap;
    border-bottom:1px solid var(--line);
    user-select:none;
  }
  thead th:hover{ color:var(--text); }
  thead th.active{ color:var(--arb); }
  thead th .arrow{ font-size:9px; margin-left:3px; opacity:0.7; }
  tbody tr{ border-bottom:1px solid var(--line); }
  tbody tr:last-child{ border-bottom:none; }
  tbody tr:hover{ background:var(--panel-alt); }
  tbody td{
    padding:8px 10px;
    white-space:nowrap;
    font-family:'JetBrains Mono',monospace;
  }
  td.name-cell{
    font-family:'Inter',sans-serif;
    font-weight:500;
    max-width:220px;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .finish-tag{
    font-size:9.5px;
    text-transform:uppercase;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    margin-left:6px;
  }
  .cell-muted{ color:var(--muted); }
  tbody tr[data-row-id]{ cursor:pointer; }
  tbody tr.detail-row{ cursor:default; background:var(--panel-alt); }
  tbody tr.detail-row:hover{ background:var(--panel-alt); }
  .detail-chart-wrap{
    padding:16px 10px;
    height:260px;
  }
  .card-image-preview{
    position:fixed;
    z-index:1000;
    width:224px;
    border-radius:12px;
    border:1px solid var(--line);
    box-shadow:0 12px 32px rgba(0,0,0,0.5);
    display:none;
    pointer-events:none;
  }

  /* --- Deals sidebar --- */
  .deals-list{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
    gap:12px;
    max-height:600px;
    overflow-y:auto;
    padding-right:2px;
  }
  .deal{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
  }
  .deal-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:8px;
  }
  .deal-name{ font-size:13.5px; font-weight:600; }
  .deal-discount{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--rise);
    white-space:nowrap;
  }
  .deal-meta{
    margin-top:4px;
    font-size:11.5px;
    color:var(--muted);
  }
  .deal-unconfirmed{
    display:inline-block;
    margin-top:6px;
    font-size:10.5px;
    color:var(--foil);
    border:1px solid rgba(201,162,39,0.35);
    padding:1px 6px;
    border-radius:20px;
  }
  .deal a{ color:var(--arb); text-decoration:none; font-size:11.5px; }
  .deal a:hover{ text-decoration:underline; }

  .empty{
    color:var(--muted);
    font-size:13.5px;
    line-height:1.6;
    padding:20px 0;
  }
  .empty code{
    background:var(--panel-alt);
    border:1px solid var(--line);
    border-radius:4px;
    padding:1px 6px;
    font-family:'JetBrains Mono',monospace;
    color:var(--text);
  }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:8px; }

  a:focus-visible, tr:focus-visible{ outline:2px solid var(--arb); outline-offset:2px; }
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-track" id="ticker"></div>
</div>

<header>
  <div>
    <h1>SIGNAL <span>/ MTG</span></h1>
    <p>Suivi de prix, écarts Cardmarket / CardNexus, et bonnes affaires en direct.</p>
  </div>
  <div class="updated" id="updated">chargement…</div>
</header>

<main>
  <p class="section-title">Watchlist</p>
  <div class="controls">
    <input type="text" id="search-input" placeholder="Rechercher une carte…">
    <select id="finish-filter">
      <option value="all">Toutes finitions</option>
      <option value="standard">Standard</option>
      <option value="foil">Foil</option>
    </select>
    <label><input type="checkbox" id="signal-only"> Signal seulement (tendance ou écart)</label>
    <span class="row-count" id="row-count"></span>
  </div>

  <div class="layout">
    <div class="table-wrap">
      <table id="watchlist-table">
        <thead>
          <tr>
            <th data-key="name">Carte</th>
            <th data-key="finish">Fin.</th>
            <th data-key="cm_low">Low CM</th>
            <th data-key="cm_avg">Avg CM</th>
            <th data-key="cm_trend">Trend CM</th>
            <th data-key="cm_avg7">Avg7 CM</th>
            <th data-key="cn_latest">CN dernier</th>
            <th data-key="cn_avg7">CN 7 jours</th>
            <th data-key="low_vs_avg_pct">Low vs Avg</th>
            <th data-key="low_vs_avg_diff">Écart L/A (€)</th>
            <th data-key="cm_vs_cn_pct">CM vs CN</th>
            <th data-key="cm_vs_cn_diff">Écart CM/CN (€)</th>
            <th data-key="trend_pct">Tendance</th>
            <th data-key="volatility_pct">Volat.</th>
            <th data-key="foil_premium">Prime foil</th>
            <th data-key="days_since_update">Maj</th>
          </tr>
        </thead>
        <tbody id="watchlist-tbody"></tbody>
      </table>
    </div>

    <div>
      <p class="section-title">Bonnes affaires récentes</p>
      <div class="deals-list" id="deals-list"></div>
    </div>
  </div>
</main>

<script>
const RISE = getComputedStyle(document.documentElement).getPropertyValue('--rise').trim();
const FALL = getComputedStyle(document.documentElement).getPropertyValue('--fall').trim();
const ARB  = getComputedStyle(document.documentElement).getPropertyValue('--arb').trim();
const MUTED= getComputedStyle(document.documentElement).getPropertyValue('--muted').trim();
const FOIL = getComputedStyle(document.documentElement).getPropertyValue('--foil').trim();

function fmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('fr-FR', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
}

function pctColor(pct){
  if(pct === null || pct === undefined) return MUTED;
  return pct >= 0 ? RISE : FALL;
}

function renderSparkline(canvas, series){
  if(!series || series.length < 2) return;
  new Chart(canvas, {
    type:'line',
    data:{
      labels: series.map(p=>p.date),
      datasets:[{
        data: series.map(p=>p.price),
        borderColor: ARB,
        borderWidth:1.5,
        pointRadius:0,
        tension:0.25,
        fill:false,
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{enabled:false} },
      scales:{ x:{display:false}, y:{display:false} },
      animation:false,
    }
  });
}

function buildDeal(deal){
  const el = document.createElement('div');
  el.className = 'deal';
  const unconfirmed = deal.confident === false
    ? `<span class="deal-unconfirmed">à vérifier — foil</span>`
    : '';
  el.innerHTML = `
    <div class="deal-top">
      <span class="deal-name">${deal.name}</span>
      <span class="deal-discount">-${deal.discount_pct}%</span>
    </div>
    <div class="deal-meta">${deal.expansion || ''} · ${deal.finish || ''} · ${deal.language || '?'} · ${deal.price_paid}€ (réf. ${deal.ref_price}€)</div>
    <div class="deal-meta">${fmtDate(deal.created_at)} · vendeur ${deal.seller_country || '?'}</div>
    ${unconfirmed}
    ${deal.url ? `<div style="margin-top:6px;"><a href="${deal.url}" target="_blank" rel="noopener">Voir l'annonce →</a></div>` : ''}
  `;
  return el;
}

function buildTicker(cards, deals){
  const items = [];

  cards.forEach(card=>{
    Object.entries(card.finishes).forEach(([finish, data])=>{
      if(data.trend_pct !== null && data.trend_pct !== undefined && Math.abs(data.trend_pct) >= 1){
        const cls = data.trend_pct >= 0 ? 'up' : 'down';
        const sign = data.trend_pct >= 0 ? '+' : '';
        items.push(`<span class="ticker-item"><span class="name">${card.name} (${finish})</span><span class="pct ${cls}">${sign}${data.trend_pct}%</span></span>`);
      }
      if(data.cross_source_gap_pct){
        items.push(`<span class="ticker-item"><span class="name">${card.name}</span><span class="pct arb-tag">écart ${data.cross_source_gap_pct}%</span></span>`);
      }
    });
  });

  deals.slice(0, 15).forEach(d=>{
    items.push(`<span class="ticker-item"><span class="name">${d.name}</span><span class="pct up">-${d.discount_pct}%</span></span>`);
  });

  return items.length ? items.join('') : `<span class="ticker-item"><span class="name">Aucune donnée pour le moment — lance le collecteur pour démarrer le suivi.</span></span>`;
}

// --- Tableau watchlist : aplatit chaque carte x finition en une ligne ---
let allRows = [];
let currentSortedRows = [];
let sortKey = 'trend_pct';
let sortDir = -1; // -1 = desc

function flattenRows(cards){
  const rows = [];
  let rowId = 0;
  cards.forEach(card=>{
    Object.entries(card.finishes).forEach(([finish, f])=>{
      rows.push({
        _id: rowId++,
        name: card.name,
        finish,
        cm_low: f.cm_low, cm_avg: f.cm_avg, cm_trend: f.cm_trend, cm_avg7: f.cm_avg7,
        cn_latest: f.cn_latest, cn_avg7: f.cn_avg7,
        low_vs_avg_pct: f.low_vs_avg_pct, low_vs_avg_diff: f.low_vs_avg_diff,
        cm_vs_cn_pct: f.cm_vs_cn_pct, cm_vs_cn_diff: f.cm_vs_cn_diff,
        trend_pct: f.trend_pct,
        volatility_pct: f.volatility_pct,
        foil_premium: finish === 'foil' ? (card.cardmarket_official ? card.cardmarket_official.foil_premium : null) : null,
        days_since_update: f.days_since_update,
        _cardnexus_history: f.cardnexus_history,
        _scryfall_history: f.scryfall_history,
        _cm_official_history: f.cm_official_history,
      });
    });
  });
  return rows;
}

function fmtPct(v){
  if(v === null || v === undefined) return '<span class="cell-muted">—</span>';
  const sign = v > 0 ? '+' : '';
  return `<span style="color:${pctColor(v)}">${sign}${v}%</span>`;
}
function fmtEur(v){ return v === null || v === undefined ? '<span class="cell-muted">—</span>' : `${v}€`; }
function fmtDays(v){ return v === null || v === undefined ? '<span class="cell-muted">—</span>' : `${v}j`; }

function sortRows(rows){
  return [...rows].sort((a, b)=>{
    let va = a[sortKey], vb = b[sortKey];
    if(va === null || va === undefined) va = -Infinity;
    if(vb === null || vb === undefined) vb = -Infinity;
    if(typeof va === 'string') return sortDir * va.localeCompare(vb);
    return sortDir * (va - vb);
  });
}

function filterRows(rows){
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const finishFilter = document.getElementById('finish-filter').value;
  const signalOnly = document.getElementById('signal-only').checked;

  return rows.filter(r=>{
    if(q && !r.name.toLowerCase().includes(q)) return false;
    if(finishFilter !== 'all' && r.finish !== finishFilter) return false;
    if(signalOnly && r.trend_pct === null && r.cross_source_gap_pct === null) return false;
    return true;
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// --- Survol : aperçu image de la carte (via Scryfall, aucune donnée à stocker nous-mêmes) ---
let imagePreviewEl = null;

function ensureImagePreviewEl(){
  if(imagePreviewEl) return imagePreviewEl;
  imagePreviewEl = document.createElement('img');
  imagePreviewEl.className = 'card-image-preview';
  document.body.appendChild(imagePreviewEl);
  return imagePreviewEl;
}

function showCardImage(evt, name){
  const img = ensureImagePreviewEl();
  img.src = `https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}&format=image&version=normal`;
  img.style.display = 'block';
  positionImagePreview(evt);
}

function positionImagePreview(evt){
  if(!imagePreviewEl) return;
  const margin = 16;
  let x = evt.clientX + margin;
  let y = evt.clientY + margin;
  if(x + 244 > window.innerWidth) x = evt.clientX - 244 - margin;
  if(y + 340 > window.innerHeight) y = window.innerHeight - 340 - margin;
  imagePreviewEl.style.left = `${x}px`;
  imagePreviewEl.style.top = `${y}px`;
}

function hideCardImage(){
  if(imagePreviewEl) imagePreviewEl.style.display = 'none';
}

// --- Clic sur une ligne : graphique détaillé de l'historique ---
let openDetailRowId = null;
let detailChartInstance = null;

function toggleDetailRow(rowId){
  const existing = document.querySelector('.detail-row');
  const wasOpenForThisRow = openDetailRowId === rowId;

  if(existing) existing.remove();
  if(detailChartInstance){ detailChartInstance.destroy(); detailChartInstance = null; }

  if(wasOpenForThisRow){
    openDetailRowId = null;
    return;
  }

  const row = currentSortedRows.find(r => r._id === rowId);
  if(!row) return;
  openDetailRowId = rowId;

  const tr = document.querySelector(`tr[data-row-id="${rowId}"]`);
  if(!tr) return;

  const detailTr = document.createElement('tr');
  detailTr.className = 'detail-row';
  const td = document.createElement('td');
  td.colSpan = 16;
  td.innerHTML = `<div class="detail-chart-wrap"><canvas class="detail-chart"></canvas></div>`;
  detailTr.appendChild(td);
  tr.insertAdjacentElement('afterend', detailTr);

  const canvas = td.querySelector('canvas');
  requestAnimationFrame(() => renderDetailChart(canvas, row));
}

function renderDetailChart(canvas, row){
  const datasets = [];

  if(row._cardnexus_history && row._cardnexus_history.length){
    datasets.push({
      label: 'CardNexus (quotidien)',
      data: row._cardnexus_history.map(p => ({ x: p.date, y: p.price })),
      borderColor: ARB, backgroundColor: 'transparent', borderWidth: 1.5, pointRadius: 0, tension: 0.2,
    });
  }
  if(row._scryfall_history && row._scryfall_history.length){
    datasets.push({
      label: 'Scryfall/Cardmarket (relevé)',
      data: row._scryfall_history.map(p => ({ x: p.date, y: p.price })),
      borderColor: RISE, backgroundColor: 'transparent', borderWidth: 1.5, pointRadius: 0, tension: 0.2,
    });
  }
  if(row._cm_official_history && row._cm_official_history.length){
    datasets.push({
      label: 'CM Low (officiel)',
      data: row._cm_official_history.filter(p => p.low !== null).map(p => ({ x: p.date, y: p.low })),
      borderColor: FOIL, backgroundColor: 'transparent', borderWidth: 1.5, pointRadius: 0, tension: 0.2, borderDash: [4, 3],
    });
    datasets.push({
      label: 'CM Avg (officiel)',
      data: row._cm_official_history.filter(p => p.avg !== null).map(p => ({ x: p.date, y: p.avg })),
      borderColor: FOIL, backgroundColor: 'transparent', borderWidth: 1.5, pointRadius: 0, tension: 0.2,
    });
  }

  if(datasets.length === 0){
    canvas.parentElement.innerHTML = `<p class="empty">Pas assez d'historique pour tracer un graphique sur cette ligne.</p>`;
    return;
  }

  detailChartInstance = new Chart(canvas, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'nearest', intersect: false },
      plugins: {
        legend: { labels: { color: MUTED, font: { family: 'Inter', size: 11 } } },
        tooltip: { mode: 'nearest', intersect: false },
      },
      scales: {
        x: { type: 'time', time: { unit: 'day' }, ticks: { color: MUTED, font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { ticks: { color: MUTED, font: { size: 10 }, callback: v => `${v}€` }, grid: { color: 'rgba(255,255,255,0.05)' } },
      },
    },
  });
}

function renderTable(){
  const filtered = filterRows(allRows);
  const sorted = sortRows(filtered);
  const tbody = document.getElementById('watchlist-tbody');

  document.getElementById('row-count').textContent = `${sorted.length} / ${allRows.length} ligne(s)`;

  if(sorted.length === 0){
    tbody.innerHTML = `<tr><td colspan="16" class="empty">Aucune ligne ne correspond aux filtres.</td></tr>`;
    return;
  }

  currentSortedRows = sorted;

  tbody.innerHTML = sorted.map(r => `
    <tr data-row-id="${r._id}">
      <td class="name-cell" data-name="${escapeHtml(r.name)}">${r.name}</td>
      <td class="cell-muted">${r.finish === 'foil' ? 'Foil' : 'Std'}</td>
      <td>${fmtEur(r.cm_low)}</td>
      <td>${fmtEur(r.cm_avg)}</td>
      <td>${fmtEur(r.cm_trend)}</td>
      <td>${fmtEur(r.cm_avg7)}</td>
      <td>${fmtEur(r.cn_latest)}</td>
      <td>${fmtEur(r.cn_avg7)}</td>
      <td>${fmtPct(r.low_vs_avg_pct)}</td>
      <td class="cell-muted">${fmtEur(r.low_vs_avg_diff)}</td>
      <td>${fmtPct(r.cm_vs_cn_pct)}</td>
      <td class="cell-muted">${fmtEur(r.cm_vs_cn_diff)}</td>
      <td>${fmtPct(r.trend_pct)}</td>
      <td>${r.volatility_pct !== null && r.volatility_pct !== undefined ? `${r.volatility_pct}%` : '<span class="cell-muted">—</span>'}</td>
      <td>${r.foil_premium ? `${r.foil_premium}×` : '<span class="cell-muted">—</span>'}</td>
      <td class="cell-muted">${fmtDays(r.days_since_update)}</td>
    </tr>
  `).join('');
}

document.querySelectorAll('#watchlist-table thead th').forEach(th=>{
  th.addEventListener('click', ()=>{
    const key = th.dataset.key;
    if(sortKey === key){ sortDir *= -1; } else { sortKey = key; sortDir = -1; }
    document.querySelectorAll('#watchlist-table thead th').forEach(t=>t.classList.remove('active'));
    th.classList.add('active');
    th.querySelector('.arrow')?.remove();
    th.insertAdjacentHTML('beforeend', `<span class="arrow">${sortDir === -1 ? '▼' : '▲'}</span>`);
    renderTable();
  });
});

['search-input', 'finish-filter', 'signal-only'].forEach(id=>{
  document.getElementById(id).addEventListener('input', renderTable);
});

// Survol : aperçu image (délégation d'événements, le tbody est stable même si son contenu change)
const tbodyEl = document.getElementById('watchlist-tbody');
tbodyEl.addEventListener('mouseover', (evt)=>{
  const cell = evt.target.closest('.name-cell');
  if(cell) showCardImage(evt, cell.dataset.name);
});
tbodyEl.addEventListener('mousemove', (evt)=>{
  const cell = evt.target.closest('.name-cell');
  if(cell) positionImagePreview(evt);
});
tbodyEl.addEventListener('mouseout', (evt)=>{
  const cell = evt.target.closest('.name-cell');
  if(cell) hideCardImage();
});

// Clic sur une ligne (hors lignes de détail elles-mêmes) : ouvre/ferme le graphique
tbodyEl.addEventListener('click', (evt)=>{
  const tr = evt.target.closest('tr[data-row-id]');
  if(!tr) return;
  toggleDetailRow(Number(tr.dataset.rowId));
});

fetch('./data.json?_=' + Date.now())
  .then(r => r.json())
  .then(data => {
    document.getElementById('updated').innerHTML = `Mis à jour <b>${fmtDate(data.generated_at)}</b>`;
    document.getElementById('ticker').innerHTML = buildTicker(data.cards, data.recent_deals) + buildTicker(data.cards, data.recent_deals);

    allRows = flattenRows(data.cards);
    if(allRows.length === 0){
      document.getElementById('watchlist-tbody').innerHTML =
        `<tr><td colspan="16" class="empty">Aucune carte suivie pour l'instant. Lance <code>python collector.py</code> et <code>python deal_scanner.py</code> au moins une fois pour peupler le dashboard.</td></tr>`;
    } else {
      renderTable();
    }

    const dealsList = document.getElementById('deals-list');
    if(data.recent_deals.length === 0){
      dealsList.innerHTML = `<p class="empty">Pas encore de bonne affaire détectée. Le scanner tourne toutes les heures via GitHub Actions.</p>`;
    } else {
      data.recent_deals.forEach(deal => dealsList.appendChild(buildDeal(deal)));
    }
  })
  .catch(err => {
    document.getElementById('updated').textContent = 'Erreur de chargement';
    document.getElementById('watchlist-tbody').innerHTML =
      `<tr><td colspan="16" class="empty">Impossible de charger data.json. Vérifie que le fichier existe dans /docs et que GitHub Pages est activé (Settings → Pages → source: /docs).</td></tr>`;
    console.error(err);
  });
</script>

</body>
</html>
